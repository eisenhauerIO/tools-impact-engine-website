  <polygon points="88,46 84,39 92,39" fill="#4a90d9" opacity="0.9"/>
  <!-- Arc Right→Bottom -->
  <path d="M 88 66 Q 88 83 71 83" fill="none" stroke="#5ab87a" stroke-width="1.8" opacity="0.85" stroke-linecap="round"/>
  <polygon points="69,83 76,79 76,87" fill="#5ab87a" opacity="0.9"/>
  <!-- Arc Bottom→Left -->
  <path d="M 49 83 Q 32 83 32 66" fill="none" stroke="#e8a23c" stroke-width="1.8" opacity="0.85" stroke-linecap="round"/>
