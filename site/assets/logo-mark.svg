  <!-- Nodes -->
  <circle cx="60" cy="27" r="11" fill="none" stroke="#4a90d9" stroke-width="1.8"/>
  <circle cx="60" cy="27" r="4" fill="#4a90d9"/>
  <circle cx="88" cy="55" r="11" fill="none" stroke="#5ab87a" stroke-width="1.8"/>
  <circle cx="88" cy="55" r="4" fill="#5ab87a"/>
  <circle cx="60" cy="83" r="11" fill="none" stroke="#e8a23c" stroke-width="1.8"/>
  <circle cx="60" cy="83" r="4" fill="#e8a23c"/>
  <circle cx="32" cy="55" r="11" fill="none" stroke="#d46b8a" stroke-width="1.8"/>
  <circle cx="32" cy="55" r="4" fill="#d46b8a"/>
</svg>
