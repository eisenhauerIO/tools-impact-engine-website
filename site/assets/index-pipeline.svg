<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 0 400 280" width="400" height="280" style="background: transparent;">

  <!-- Arc Top→Right (Measure → Evaluate) -->
  <path d="M 171 57 Q 218 57 218 104" fill="none" stroke="#4a90d9" stroke-width="2.5" opacity="0.85" stroke-linecap="round"
        style="stroke: light-dark(rgb(74, 144, 217), rgb(92, 121, 163));"/>
  <polygon points="218,108 214,99 222,99" fill="#4a90d9" opacity="0.9"
           style="fill: light-dark(rgb(74, 144, 217), rgb(92, 121, 163));"/>

  <!-- Arc Right→Bottom (Evaluate → Allocate) -->
  <path d="M 218 176 Q 218 223 171 223" fill="none" stroke="#5ab87a" stroke-width="2.5" opacity="0.85" stroke-linecap="round"
        style="stroke: light-dark(rgb(90, 184, 122), rgb(68, 110, 44));"/>
  <polygon points="167,223 176,219 176,227" fill="#5ab87a" opacity="0.9"
           style="fill: light-dark(rgb(90, 184, 122), rgb(68, 110, 44));"/>

  <!-- Arc Bottom→Left (Allocate → Scale) -->
  <path d="M 109 223 Q 62 223 62 176" fill="none" stroke="#e8a23c" stroke-width="2.5" opacity="0.85" stroke-linecap="round"
        style="stroke: light-dark(rgb(232, 162, 60), rgb(109, 81, 0));"/>
  <polygon points="62,172 58,181 66,181" fill="#e8a23c" opacity="0.9"
           style="fill: light-dark(rgb(232, 162, 60), rgb(109, 81, 0));"/>

  <!-- Arc Left→Top (Scale → Measure) -->
  <path d="M 62 104 Q 62 57 109 57" fill="none" stroke="#d46b8a" stroke-width="2.5" opacity="0.85" stroke-linecap="round"
        style="stroke: light-dark(rgb(212, 107, 138), rgb(149, 119, 163));"/>
  <polygon points="113,57 104,53 104,61" fill="#d46b8a" opacity="0.9"
           style="fill: light-dark(rgb(212, 107, 138), rgb(149, 119, 163));"/>

  <!-- Node: MEASURE (top) — label above -->
  <circle cx="140" cy="57" r="22" fill="none" stroke="#4a90d9" stroke-width="2.5"
          style="stroke: light-dark(rgb(74, 144, 217), rgb(92, 121, 163));"/>
  <circle cx="140" cy="57" r="8" fill="#4a90d9"
          style="fill: light-dark(rgb(74, 144, 217), rgb(92, 121, 163));"/>
  <text x="140" y="22" fill="#4a90d9" font-family="'Inter', Helvetica, sans-serif" font-weight="600" text-anchor="middle" font-size="12px" letter-spacing="0.5px"
        style="fill: light-dark(rgb(74, 144, 217), rgb(92, 121, 163));">MEASURE</text>

  <!-- Node: EVALUATE (right) — label to the right -->
  <circle cx="218" cy="140" r="22" fill="none" stroke="#5ab87a" stroke-width="2.5"
          style="stroke: light-dark(rgb(90, 184, 122), rgb(68, 110, 44));"/>
  <circle cx="218" cy="140" r="8" fill="#5ab87a"
          style="fill: light-dark(rgb(90, 184, 122), rgb(68, 110, 44));"/>
  <text x="252" y="145" fill="#5ab87a" font-family="'Inter', Helvetica, sans-serif" font-weight="600" text-anchor="start" font-size="12px" letter-spacing="0.5px"
        style="fill: light-dark(rgb(90, 184, 122), rgb(68, 110, 44));">EVALUATE</text>

  <!-- Node: ALLOCATE (bottom) — label below -->
  <circle cx="140" cy="223" r="22" fill="none" stroke="#e8a23c" stroke-width="2.5"
          style="stroke: light-dark(rgb(232, 162, 60), rgb(109, 81, 0));"/>
  <circle cx="140" cy="223" r="8" fill="#e8a23c"
          style="fill: light-dark(rgb(232, 162, 60), rgb(109, 81, 0));"/>
  <text x="140" y="264" fill="#e8a23c" font-family="'Inter', Helvetica, sans-serif" font-weight="600" text-anchor="middle" font-size="12px" letter-spacing="0.5px"
        style="fill: light-dark(rgb(232, 162, 60), rgb(109, 81, 0));">ALLOCATE</text>

  <!-- Node: SCALE (left) — label to the left -->
  <circle cx="62" cy="140" r="22" fill="none" stroke="#d46b8a" stroke-width="2.5"
          style="stroke: light-dark(rgb(212, 107, 138), rgb(149, 119, 163));"/>
  <circle cx="62" cy="140" r="8" fill="#d46b8a"
          style="fill: light-dark(rgb(212, 107, 138), rgb(149, 119, 163));"/>
  <text x="28" y="145" fill="#d46b8a" font-family="'Inter', Helvetica, sans-serif" font-weight="600" text-anchor="end" font-size="12px" letter-spacing="0.5px"
        style="fill: light-dark(rgb(212, 107, 138), rgb(149, 119, 163));">SCALE</text>

</svg>
